name: "modbus-proxy"
description: "Proxy for Accessing modbus systems. Allows multiple client connections"
version: "1.0.18"
slug: "modbus_proxy"
arch:
  - aarch64
  - amd64
  - armhf
  - armv7
url: "https://community.home-assistant.io/t/updated-solaredge-modbus-full-setup-guide-with-energy-dashboard-integration-for-installations-with-battery-connected/340956/216?u=akulatraxas"
startup: services
init: false
options:
  devices:
    - upstreamhost: "192.168.178.74"
      upstreamport: 502
      listenport: 502
      connection_time: 0.1
      timeout: 10
  loglevel: "INFO"
schema:
  devices:
    - upstreamhost: str
      upstreamport: int
      listenport: int
      connection_time: float
      timeout: int
  loglevel: list(INFO|DEBUG|ERROR)
ports:
  10502/tcp: 10502
  10503/tcp: 10503
  10504/tcp: 10504
  10505/tcp: 10505
full_access: true
